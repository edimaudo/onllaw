
<div class="mb-8">

        <button onclick="showTab('file')" class="py-2 px-4 border-b-2 border-gold font-bold">Full Document</button>

    </div>
    
    <div id="file-upload" class="py-6">
        <p class="text-sm mb-2 italic">Upload your .docx or .pdf contract</p>

    </div>
