{% extends "base.html" %}

{% block content %}
<div class="bg-[#002147] min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-6">
        <h2 class="text-3xl font-bold text-white mb-2">Contract Review</h2>
        
        <div class="mb-8">
            <div class="flex border-b border-white/20">
                <button onclick="showTab('file')" class="py-2 px-4 border-b-2 border-gold font-bold text-white">Full Document</button>
                <button onclick="showTab('section')" class="py-2 px-4 text-gray-400 hover:text-white">Specific Clause</button>
            </div>
            
            <div id="file-upload" class="py-6">
                <p class="text-sm mb-2 italic text-gray-300">Upload your .docx or .pdf contract</p>
            </div>

            <div id="section-review" class="py-6 hidden">
                <p class="text-sm mb-2 italic text-gray-300">Paste a specific section (e.g., Termination Clause)</p>
                <textarea name="clause_text" class="w-full h-32 p-3 border rounded text-navy" placeholder="Paste text here..."></textarea>
                <button class="btn-gold px-6 py-2 mt-2 rounded">Review Section</button>
            </div>
        </div>
    </div>
</div>

<script>
    function copyEmail() {
        const text = document.getElementById('email-body').innerText;
        navigator.clipboard.writeText(text);
        alert('Email draft copied!');
    }

    function showTab(tab) {
        if (tab === 'file') {
            document.getElementById('file-upload').classList.remove('hidden');
            document.getElementById('section-review').classList.add('hidden');
        } else {
            document.getElementById('file-upload').classList.add('hidden');
            document.getElementById('section-review').classList.remove('hidden');
        }
    }
</script>
{% endblock %}
