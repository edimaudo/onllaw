<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}onllaw{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Lato:wght@400;700&family=Century+Schoolbook&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #002147; --light-gray: #F5F5F5; --gold: #D4AF37; }
        body { font-family: 'Lato', sans-serif; background-color: white; color: var(--navy); }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .legal-text { font-family: 'Century Schoolbook', serif; }
        .bg-navy { background-color: var(--navy); }
        .btn-gold { background-color: var(--gold); color: white; transition: 0.3s; }
        .btn-gold:hover { background-color: #B8962E; transform: translateY(-1px); }
        .border-gold { border-color: var(--gold); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="p-6 bg-white border-b border-gray-100 flex justify-between items-center sticky top-0 z-50">
        <a href="/" class="text-2xl font-bold tracking-tighter text-navy flex items-center">
            <span class="text-gold mr-1"></span> onllaw
        </a>
        <div class="space-x-8 font-semibold text-sm uppercase tracking-widest hidden md:flex">
            <a href="api/qa" class="hover:text-gold transition">Q&A</a>
            <a href="api/audit" class="hover:text-gold transition">Contract Review</a>
            <a href="#" class="hover:text-gold transition">GTA Lawyers</a>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-navy text-white py-12 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <p class="text-sm opacity-70">© 2026 onllaw. Legal info only, not legal advice.</p>
        </div>
    </footer>
</body>
</html>
