<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}onllaw{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --navy: #002147; 
            --gold: #D4AF37; 
            --gold-hover: #B8962E;
            
            /* Light Mode (Accessible High Contrast Defaults) */
            --bg-primary: #F5F5F5;      /* Off-white canvas instead of blinding pure white */
            --text-primary: #002147;    /* Deep navy readable text */
            --bg-card: #ffffff;         /* Pure white container surfaces */
            --border-color: #D4AF37;    /* Gold accents for structures */
        }

        .dark-theme {
            /* Dark Mode */
            --bg-primary: #002147;      /* Classic deep navy theme background */
            --text-primary: #ffffff;    /* Crisp white text */
            --bg-card: #112240;         /* Slightly lighter navy panel surfaces */
            --border-color: #D4AF37;    /* Gold structural borders */
        }

        .font-size-small { font-size: 14px; }
        .font-size-medium { font-size: 16px; }
        .font-size-large { font-size: 19px; }

        body { 
            font-family: 'Century Schoolbook', 'Montserrat', 'Lato', sans-serif; 
            background-color: var(--bg-primary); 
            color: var(--text-primary);
            transition: background-color 0.2s, color 0.2s, font-size 0.2s;
        }

        /* Enforce structured high-contrast styling across buttons */
        .btn-core-action {
            background-color: var(--gold) !important;
            color: #002147 !important; /* Always readable dark navy text on gold */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
        }
        .btn-core-action:hover {
            background-color: var(--gold-hover) !important;
            transform: translateY(-1px);
        }

        *:focus-visible {
            outline: 3px solid var(--gold) !important;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen font-size-medium">
    
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:p-4 focus:bg-white focus:text-[#002147] focus:z-50 border-2 border-gold">
        Skip to main content
    </a>

    <nav class="p-4 md:p-6 bg-white border-b border-gray-200 flex flex-wrap justify-between items-center sticky top-0 z-50 text-[#002147]">
        <a href="/" class="text-2xl font-bold tracking-tighter flex items-center" aria-label="onllaw Home">
            onllaw
        </a>
        
        <div class="flex flex-wrap items-center gap-4 mt-4 md:mt-0 w-full md:w-auto justify-between md:justify-end">
            
            <!-- Accessibility Dashboard Panel -->
            <div class="flex items-center gap-3 bg-gray-100 p-2 rounded-md" role="region" aria-label="Accessibility Controls">
                <div class="flex items-center gap-1 border-r border-gray-300 pr-2">
                    <span class="text-xs font-bold text-[#002147] mr-1" id="fs-label">A:</span>
                    <button onclick="changeFontSize('small')" class="px-2 py-1 text-xs font-semibold bg-white border border-gray-300 rounded hover:bg-gray-200 text-[#002147]" aria-describedby="fs-label">Small</button>
                    <button onclick="changeFontSize('medium')" class="px-2 py-1 text-xs font-bold bg-white border border-gray-300 rounded hover:bg-gray-200 text-[#002147]" aria-describedby="fs-label">Med</button>
                    <button onclick="changeFontSize('large')" class="px-2 py-1 text-sm font-black bg-white border border-gray-300 rounded hover:bg-gray-200 text-[#002147]" aria-describedby="fs-label">Large</button>
                </div>
                
                <button id="theme-toggle" onclick="toggleTheme()" class="px-3 py-1 text-xs font-bold bg-[#002147] text-white rounded hover:bg-opacity-90">
                    Theme: Light
                </button>
            </div>

            <!-- Standalone Province Select Control Container -->
            <div id="province-selector-container" class="flex items-center gap-2">
                <label for="province-select" class="text-xs font-bold uppercase tracking-wider text-[#002147]">Province:</label>
                <select id="province-select" class="p-1.5 text-xs font-semibold bg-white border border-gray-300 rounded text-[#002147] focus:border-gold">
                    <option value="AB">Alberta</option>
                    <option value="BC">British Columbia</option>
                    <option value="MB">Manitoba</option>
                    <option value="NB">New Brunswick</option>
                    <option value="NL">Newfoundland and Labrador</option>
                    <option value="NS">Nova Scotia</option>
                    <option value="ON" selected>Ontario</option>
                    <option value="PE">Prince Edward Island</option>
                    <option value="QC">Quebec</option>
                    <option value="SK">Saskatchewan</option>
                </select>
            </div>

            <div class="space-x-4 md:space-x-8 font-semibold text-sm uppercase tracking-widest flex text-[#002147]">
                <a href="qa" class="hover:text-[#D4AF37] transition duration-300">Q&A</a>
                <a href="/audit" class="hover:text-[#D4AF37] transition duration-300">Contract Review</a>
                <!-- <a href="/lawyers" class="hover:text-[#D4AF37] transition duration-300">Lawyers</a> -->
            </div>
        </div>
    </nav>

    <main class="flex-grow" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-[#002147] text-white py-12 px-6 border-t border-gray-700">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm opacity-70">© 2026 onllaw. Legal info only, not legal advice.</p>
        </div>
    </footer>

    <script>
        function updateThemeButtonText(isDark) {
            const themeBtn = document.getElementById('theme-toggle');
            if (themeBtn) {
                themeBtn.innerText = isDark ? "Theme: Dark" : "Theme: Light";
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const path = window.location.pathname;
            if (path === '/' || path.endsWith('index.html') || path === '') {
                const container = document.getElementById('province-selector-container');
                if (container) container.style.setProperty('display', 'none', 'important');
            }
            
            const savedSize = localStorage.getItem('preferred-font-size');
            if (savedSize) changeFontSize(savedSize);

            const savedTheme = localStorage.getItem('preferred-theme');
            const isDark = savedTheme === 'dark';
            
            if (isDark && !(path === '/' || path.endsWith('index.html') || path === '')) {
                document.documentElement.classList.add('dark-theme');
                updateThemeButtonText(true);
            } else {
                updateThemeButtonText(false);
            }


                const savedProvince = localStorage.getItem('preferred-province');
                if (dropdown && savedProvince) {
                    dropdown.value = savedProvince;
                }
            
        
                if (dropdown) {
                    dropdown.addEventListener('change', updatePageProvinceText);
                }
            
               
               if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    setTimeout(updatePageProvinceText, 1);
                } else {
                    window.addEventListener('load', updatePageProvinceText);
                }
        });

        function changeFontSize(size) {
            document.body.classList.remove('font-size-small', 'font-size-medium', 'font-size-large');
            document.body.classList.add(`font-size-${size}`);
            localStorage.setItem('preferred-font-size', size);
        }

        function toggleTheme() {
            const path = window.location.pathname;
            if (path === '/' || path.endsWith('index.html') || path === '') return;
            
            const isDark = document.documentElement.classList.toggle('dark-theme');
            localStorage.setItem('preferred-theme', isDark ? 'dark' : 'light');
            updateThemeButtonText(isDark);
        }
        // Function to update the page prose text based on what is selected
        function updatePageProvinceText() {
            const dropdown = document.getElementById('province-select');
            const dynamicTextSpan = document.getElementById('dynamic-province-text');
            
            if (dropdown) {
                // Save the selection code (e.g. "BC", "ON") to localStorage
                localStorage.setItem('preferred-province', dropdown.value);
                
                // If the current page contains our text hook, swap the wording
                if (dynamicTextSpan) {
                    const selectedProvinceName = dropdown.options[dropdown.selectedIndex].text;
                    dynamicTextSpan.innerText = selectedProvinceName;
                }
            }
        }
    </script>
</body>
</html>
