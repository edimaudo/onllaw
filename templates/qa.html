{% extends "base.html" %}

{% block content %}
<div class="min-h-screen py-12 px-6">
    <div class="max-w-4xl mx-auto">
        <h2 class="text-3xl font-bold mb-2">Employee Q&A</h2>
        <p class="opacity-80 mb-8">Consult the Employment Standards Act.</p>

        <div class="bg-[var(--bg-card)] p-6 md:p-8 border border-gray-200 shadow-sm text-[#002147]">
            <form id="qaForm">
                <div class="mb-6">
                    <label for="question" class="block text-sm font-bold mb-2 uppercase tracking-wider">Your Inquiry</label>
                    <textarea id="question" name="question" required
                        class="w-full h-32 p-4 border border-gray-300 bg-white text-[#002147] shadow-sm outline-none transition legal-text"
                        placeholder="Enter your question regarding Ontario employment rights..."></textarea>
                </div>

                <button type="submit" id="submitBtn" class="btn-core-action w-full py-4">
                    SUBMIT INQUIRY
                </button>
            </form>

            <div id="resultContainer" class="hidden mt-8 p-6 bg-gray-50 border-t-2 border-yellow-500 rounded">
                <h3 class="font-bold mb-2 uppercase text-sm text-[#002147]">Legal Information Summary</h3>
                <div id="answerArea" class="legal-text leading-relaxed text-[#002147] whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('qaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const questionInput = document.getElementById('question');
    const submitBtn = document.getElementById('submitBtn');
    const resultContainer = document.getElementById('resultContainer');
    const answerArea = document.getElementById('answerArea');

    submitBtn.disabled = true;
    submitBtn.innerText = "Consulting the Employment Service Act (ESA)...";
    resultContainer.classList.add('hidden');

    try {
        const formData = new FormData();
        formData.append('question', questionInput.value);

        const response = await fetch('/api/qa', {
            method: 'POST',
            body: formData 
        });
        if (!response.ok) throw new Error('Network response error');

        const data = await response.json();
        resultContainer.classList.remove('hidden');
        answerArea.innerText = data.answer || "No specific guidance found for this inquiry.";
    } catch (error) {
        console.error('Error:', error);
        resultContainer.classList.remove('hidden');
        answerArea.innerText = "An error occurred while communicating with the system.";
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "SUBMIT INQUIRY";
    }
});
</script>
{% endblock %}
