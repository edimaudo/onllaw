{% extends "base.html" %}

{% block content %}
<div class="bg-[var(--bg-primary)] text-[var(--text-primary)] min-h-screen transition-colors duration-300">
    <div class="max-w-4xl mx-auto py-12 px-6">
        <h2 class="text-3xl font-bold mb-2">Employee Q&A</h2>
        <p class="opacity-80 mb-8">Consult the Employment Standards Act.</p>

        <div class="bg-[var(--bg-card)] p-4 md:p-8 border border-[var(--border-color)] shadow-sm">
            <form id="qaForm">
                <div class="mb-6">
                    <label for="question" class="block text-sm font-bold mb-2 uppercase">Your Inquiry</label>
                    <textarea id="question" name="question" required
                        class="w-full h-32 p-4 border border-[var(--border-color)] bg-[var(--bg-primary)] text-[var(--text-primary)] shadow-sm outline-none transition legal-text"
                        placeholder="Enter your question regarding Ontario employment rights..."></textarea>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-4 bg-navy !text-white font-bold hover:bg-opacity-80 transition uppercase tracking-widest">
                    SUBMIT INQUIRY
                </button>
            </form>

            <div id="resultContainer" class="hidden mt-8 p-6 bg-gray-100/10 border-t-2 border-yellow-500">
                <h3 class="font-bold mb-2 uppercase text-sm">Legal Information Summary</h3>
                <div id="answerArea" class="legal-text leading-relaxed whitespace-pre-wrap" style="white-space: pre-wrap;"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('qaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const questionInput = document.getElementById('question');
    const submitBtn = document.getElementById('submitBtn');
    const resultContainer = document.getElementById('resultContainer');
    const answerArea = document.getElementById('answerArea');

    submitBtn.disabled = true;
    submitBtn.innerText = "Consulting the Employment Service Act (ESA)...";
    resultContainer.classList.add('hidden');

    try {
        const formData = new FormData();
        formData.append('question', questionInput.value);

        const response = await fetch('/api/qa', {
            method: 'POST',
            body: formData 
        });

        if (!response.ok) throw new Error('Network response was not ok');

        const data = await response.json();
        resultContainer.classList.remove('hidden');
        answerArea.innerText = data.answer || "No specific guidance found for this inquiry.";

    } catch (error) {
        console.error('Error:', error);
        resultContainer.classList.remove('hidden');
        answerArea.innerText = "An error occurred while communicating with the system. Please check the console for details.";
    } finaly {
        submitBtn.disabled = false;
        submitBtn.innerText = "SUBMIT INQUIRY";
    }
});
</script>
{% endblock %}
