{% extends "base.html" %}

{% block content %}
<div class="bg-[#002147] min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-6">
        <h2 class="text-3xl font-bold text-white mb-2">Employee Q&A</h2>
        <p class="text-gray-300 mb-8">Consult the Ontario Employment Standards Act.</p>

        <div class="bg-white p-8 border border-gray-200 shadow-sm">
            <form id="qaForm">
                <div class="mb-6">
                    <label class="block text-sm font-bold text-navy mb-2 uppercase">Your Inquiry</label>
                    <textarea id="question" name="question" required
                        class="w-full h-32 p-4 border border-gray-300 rounded-none focus:border-gold outline-none transition legal-text text-navy"
                        placeholder="Enter your question regarding Ontario employment rights..."></textarea>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-4 bg-navy text-white font-bold hover:bg-opacity-90 transition">
                    SUBMIT INQUIRY
                </button>
            </form>

            <div id="resultContainer" class="hidden mt-8 p-6 bg-light-gray border-t-2 border-gold">
                <h3 class="font-bold text-navy mb-2 uppercase text-sm">Legal Information Summary</h3>
                <div id="answerArea" class="legal-text leading-relaxed text-navy whitespace-pre-wrap"></div>
                <p class="mt-4 text-xs text-gray-500 italic">Disclaimer: This information is generated by AI and does not constitute legal advice.</p>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('qaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const questionInput = document.getElementById('question');
    const submitBtn = document.getElementById('submitBtn');
    const resultContainer = document.getElementById('resultContainer');
    const answerArea = document.getElementById('answerArea');

    // UI State: Loading
    submitBtn.disabled = true;
    submitBtn.innerText = "CONSULTING THE ESA...";
    resultContainer.classList.add('hidden');

    try {
        const response = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: questionInput.value })
        });

        if (!response.ok) throw new Error('Network response was not ok');

        const data = await response.json();

        // UI State: Success
        resultContainer.classList.remove('hidden');
        // We use innerText with whitespace-pre-wrap for clean legal formatting
        answerArea.innerText = data.answer || "No specific guidance found for this inquiry.";

    } catch (error) {
        console.error('Error:', error);
        resultContainer.classList.remove('hidden');
        answerArea.innerText = "System Error: Unable to reach the legal analysis agent. Please try again later.";
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "SUBMIT INQUIRY";
    }
});
</script>
{% endblock %}
